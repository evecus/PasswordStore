name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'New release'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/app/keystore.jks

      - name: Build Release APK (arm64 only)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Locate and rename APK
        run: |
          echo "=== APK output files ==="
          find app/build/outputs/apk/release -name "*.apk"
          APK_PATH=$(find app/build/outputs/apk/release -name "*arm64*release*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          echo "Using APK: $APK_PATH"
          cp "$APK_PATH" "PasswordManager-${{ github.event.inputs.tag }}-arm64.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "密码管理器 ${{ github.event.inputs.tag }}"
          body: |
            ## 密码管理器 ${{ github.event.inputs.tag }}

            ${{ github.event.inputs.release_notes }}

            ### 功能
            - 🔐 AES-256-GCM 加密存储密码
            - 📁 密码分组管理
            - ⭐ 收藏常用密码
            - 🔍 快速搜索
            - 📋 一键复制账号/密码
            - 🔑 随机密码生成器（16位）

            ### 安装要求
            - Android 8.0 (API 26) 及以上
            - arm64-v8a 架构（绝大多数现代安卓手机）

            ### 安装步骤
            1. 下载 `PasswordManager-${{ github.event.inputs.tag }}-arm64.apk`
            2. 手机设置中允许"安装未知来源应用"
            3. 打开 APK 安装即可
          files: PasswordManager-${{ github.event.inputs.tag }}-arm64.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f $GITHUB_WORKSPACE/app/keystore.jks
